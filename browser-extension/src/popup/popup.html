<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Vault</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="loading" class="screen">
    <div class="loading-spinner"></div>
  </div>

  <div id="screen-login" class="screen hidden">
    <div class="header">
      <div class="header-title">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L3 7v5c0 5.25 3.75 10.13 9 11.25C17.25 22.13 21 17.25 21 12V7l-9-5z"/>
        </svg>
        <span>Password Vault</span>
      </div>
      <div class="connection-status" id="connection-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Checking...</span>
      </div>
    </div>
    <form id="login-form" class="form-section">
      <label for="master-password">Master Password</label>
      <input type="password" id="master-password" placeholder="Enter master password" autocomplete="off" required>
      <div id="login-error" class="error-text hidden"></div>
      <button type="submit" id="login-btn" class="btn btn-primary">Unlock Vault</button>
    </form>
  </div>

  <div id="screen-2fa" class="screen hidden">
    <div class="header">
      <div class="header-title">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L3 7v5c0 5.25 3.75 10.13 9 11.25C17.25 22.13 21 17.25 21 12V7l-9-5z"/>
        </svg>
        <span>Two-Factor Auth</span>
      </div>
    </div>
    <form id="twofa-form" class="form-section">
      <label for="twofa-code">Authentication Code</label>
      <input type="text" id="twofa-code" placeholder="6-digit code or backup code" autocomplete="one-time-code" required>
      <div id="twofa-error" class="error-text hidden"></div>
      <button type="submit" id="twofa-btn" class="btn btn-primary">Verify</button>
      <button type="button" id="twofa-back" class="btn btn-secondary">Back</button>
    </form>
  </div>

  <div id="screen-credentials" class="screen hidden">
    <div class="header">
      <div class="header-title">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L3 7v5c0 5.25 3.75 10.13 9 11.25C17.25 22.13 21 17.25 21 12V7l-9-5z"/>
        </svg>
        <span>Password Vault</span>
      </div>
      <button id="lock-btn" class="btn-icon" title="Lock vault">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </button>
    </div>
    <div class="search-section">
      <input type="text" id="search-input" placeholder="Search credentials...">
    </div>
    <div id="credentials-list" class="credentials-list"></div>
    <div id="credentials-empty" class="empty-state hidden">
      <p>No credentials found</p>
    </div>
  </div>

  <div id="screen-save" class="screen hidden">
    <div class="header">
      <div class="header-title">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L3 7v5c0 5.25 3.75 10.13 9 11.25C17.25 22.13 21 17.25 21 12V7l-9-5z"/>
        </svg>
        <span>Save Credential</span>
      </div>
    </div>
    <div class="form-section">
      <p class="save-prompt-text">Save this credential to your vault?</p>
      <div class="save-detail">
        <label>Website</label>
        <span id="save-domain"></span>
      </div>
      <div class="save-detail">
        <label>Username</label>
        <span id="save-username"></span>
      </div>
      <div class="save-detail">
        <label>Password</label>
        <span id="save-password-preview"></span>
      </div>
      <div id="save-duplicate" class="save-duplicate-warning hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span>This credential already exists in your vault</span>
      </div>
      <div id="save-error" class="error-text hidden"></div>
      <button id="save-confirm" class="btn btn-primary">Save to Vault</button>
      <button id="save-dismiss" class="btn btn-secondary">Dismiss</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
